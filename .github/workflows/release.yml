name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          command: manifest
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Stage Production (Signed)
        run: ./gradlew publish
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: KarasuLab Mod Releaser
        uses: Karasu-Lab/Karasu-Lab-Mod-Releaser@v2.1.1
        with:
          modrinth_project_id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth_token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge_project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge_token: ${{ secrets.CURSEFORGE_TOKEN }}

      - name: Create Maven Central Bundle
        run: |
          cd build/repo
          zip -r ../bundle.zip .
          cd ../..

      - name: Publish to Maven Central
        uses: central-repository/publish-action@v1
        with:
          zip-path: build/bundle.zip
          token: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          deployment-name: KarasunikiLib-${{ needs.release-please.outputs.version }}

      - name: Build Development Assets (Unsigned -dev)
        run: ./gradlew assemble sourcesJar

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            **/build/libs/*-dev-*.jar
            **/build/libs/*-sources.jar
