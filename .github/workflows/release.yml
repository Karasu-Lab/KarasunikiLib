name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and Stage Production (Signed)
        run: ./gradlew publish
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}

      - name: KarasuLab Mod Releaser
        uses: Karasu-Lab/Karasu-Lab-Mod-Releaser@v2.2.4
        with:
          modrinth_project_id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth_token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge_project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge_token: ${{ secrets.CURSEFORGE_TOKEN }}
          skip_release_please: true
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          release_body: ${{ needs.release-please.outputs.version }}

      - name: Create Maven Central Bundle
        run: |
          cd build/repo
          zip -r ../bundle.zip .
          cd ../..

      - name: Publish to Maven Central
        run: |
          curl --request POST \
            --user "${{ secrets.MAVEN_CENTRAL_USERNAME }}:${{ secrets.MAVEN_CENTRAL_PASSWORD }}" \
            --form bundle=@build/bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"

      - name: Build Development Assets (Unsigned -dev)
        run: ./gradlew assemble sourcesJar

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            **/build/libs/*-dev-*.jar
            **/build/libs/*-sources.jar
